name: Save Data
on:
  repository_dispatch:
    types: [save-data]
permissions:
  contents: write
jobs:
  save:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_TOKEN }}
      - name: Write data file
        env:
          DATA_PAYLOAD: ${{ toJson(github.event.client_payload.data) }}
        run: |
          node -e "
            const fs = require('fs');
            const raw = process.env.DATA_PAYLOAD;
            const parsed = JSON.parse(raw);
            fs.writeFileSync('data.json', parsed);
            console.log('Written:', fs.statSync('data.json').size, 'bytes');
          "
      - name: Commit and push
        run: |
          git config user.email "training@bradken.com"
          git config user.name "Bradken Training"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.DATA_TOKEN }}
