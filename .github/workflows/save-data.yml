name: Save Data
on:
  repository_dispatch:
    types: [save-data]
permissions:
  contents: write
jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.DATA_TOKEN }}
      - name: Write data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = context.payload.client_payload.data;
            fs.writeFileSync('data.json', data);
      - name: Commit and push
        run: |
          git config user.email "training@bradken.com"
          git config user.name "Bradken Training"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.DATA_TOKEN }}
