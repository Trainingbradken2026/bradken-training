name: Save Data
on:
  repository_dispatch:
    types: [save-data]
jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Write data
        run: echo '${{ github.event.client_payload.data }}' > data.json
      - name: Commit
        run: |
          git config user.email "training@bradken.com"
          git config user.name "Bradken Training"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.DATA_TOKEN }}
